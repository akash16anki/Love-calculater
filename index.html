<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love-calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1  id="heading">Love-Calculator</h1>
    <div class="container">
        <form id="love-form">
            <label for="yourName">YourName : </label>
            <input type="text" name="username" id="yourName" class="input" required>
    
            <label for="CrushName">CrushName : </label>
            <input type="text" name="CrushName" id="CrushName" class="input" required>
            <button type="submit" id="btn">Calculate</button>
        </form>
    </div>
    <div class="result-container">
            <h3 id="result"><span id="actualR"></span></h3>

    </div>
    <script src="script.js"></script>
</body>

</html>
